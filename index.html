<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strictly Business — Community Referral Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Tokens ─────────────────────────────────────── */
    :root {
      --black:   #0E0E0E;
      --dark:    #141414;
      --charcoal:#1E1E1E;
      --gold:    #C9A44A;
      --gold-lt: #E2C47A;
      --gold-dim:#7A5F28;
      --cream:   #F5F2ED;
      --off:     #EFEDE8;
      --white:   #FFFFFF;
      --text:    #1A1A1A;
      --muted:   #6B6560;
      --border:  #E0DDD7;
      --card-bg: #FFFFFF;
      --radius:  12px;
      --shadow:  0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 16px rgba(201,164,74,0.15), 0 12px 40px rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── LOADER ─────────────────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--dark);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .loader-rings {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 40px;
    }

    .loader-rings span {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid transparent;
    }
    .loader-rings span:nth-child(1) {
      border-top-color: var(--gold);
      animation: spin 1.2s linear infinite;
    }
    .loader-rings span:nth-child(2) {
      inset: 14px;
      border-right-color: var(--gold-lt);
      animation: spin 1.6s linear infinite reverse;
      opacity: 0.7;
    }
    .loader-rings span:nth-child(3) {
      inset: 28px;
      border-bottom-color: var(--gold);
      animation: spin 2s linear infinite;
      opacity: 0.5;
    }

    .loader-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    .loader-sub {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 8px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.7s forwards;
    }

    .loader-bar {
      width: 160px;
      height: 1px;
      background: var(--charcoal);
      margin-top: 32px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.4s ease 1s forwards;
    }
    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-lt));
      animation: loadbar 1.8s ease 1.1s forwards;
    }
    @keyframes loadbar { to { width: 100%; } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #loader.hide {
      animation: loaderOut 0.6s ease forwards;
    }
    @keyframes loaderOut {
      to { opacity: 0; pointer-events: none; }
    }

    /* ─── HEADER ─────────────────────────────────────── */
    #app { opacity: 0; transition: opacity 0.5s ease; }
    #app.visible { opacity: 1; }

    header {
      background: var(--dark);
      padding: 28px 32px 0;
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .wordmark {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .wordmark-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .wordmark-title span { color: var(--gold); }
    .wordmark-sub {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
      font-weight: 500;
    }

    .header-count {
      text-align: right;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .header-count strong {
      display: block;
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    /* ─── SEARCH BAR ─────────────────────────────────── */
    .search-strip {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 20px 0 0;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 240px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      color: var(--white);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .search-wrap input:focus {
      border-color: var(--gold-dim);
      background: rgba(255,255,255,0.1);
    }

    .date-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .date-group label {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
    .date-group input[type="date"] {
      padding: 10px 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
    }
    .date-group input[type="date"]:focus {
      border-color: var(--gold-dim);
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      background: var(--gold);
      color: var(--dark);
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-add:hover { background: var(--gold-lt); }

    /* ─── CATEGORY PILLS ─────────────────────────────── */
    .pill-strip {
      background: var(--dark);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 32px;
      overflow-x: auto;
      scrollbar-width: none;
      display: flex;
      gap: 6px;
      align-items: center;
      min-height: 52px;
    }
    .pill-strip::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.55);
      background: transparent;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .pill:hover {
      border-color: var(--gold-dim);
      color: var(--gold-lt);
    }
    .pill.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--dark);
      font-weight: 600;
    }

    /* ─── TOOLBAR ────────────────────────────────────── */
    .toolbar {
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
    }

    .toolbar-count {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .toolbar-count strong { color: var(--text); }

    .sort-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .sort-wrap select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      background: white;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    /* ─── GRID ───────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 16px;
      padding: 24px 32px 48px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
      border-color: rgba(201,164,74,0.3);
    }
    .card:hover::before { opacity: 1; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.25;
    }

    .card-cat {
      flex-shrink: 0;
      padding: 3px 10px;
      background: var(--off);
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.03em;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .card-service {
      font-size: 0.875rem;
      color: #3D3A35;
      line-height: 1.5;
    }

    .card-contact {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gold-dim);
    }
    .card-contact a {
      color: inherit;
      text-decoration: none;
    }
    .card-contact a:hover { color: var(--gold); }

    .card-notes {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.55;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .card-date {
      font-size: 0.7rem;
      color: #B0AA9F;
      margin-top: auto;
      letter-spacing: 0.02em;
    }

    /* ─── EMPTY / LOADING ────────────────────────────── */
    .state-box {
      grid-column: 1/-1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      color: var(--muted);
      gap: 12px;
      text-align: center;
    }
    .state-box .icon { font-size: 2.5rem; opacity: 0.4; }
    .state-box h3 { font-size: 1rem; color: var(--text); }
    .state-box p { font-size: 0.875rem; }

    .mini-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ─── LOAD MORE ──────────────────────────────────── */
    .load-more-wrap {
      text-align: center;
      padding: 0 32px 48px;
    }
    .btn-more {
      padding: 12px 36px;
      background: var(--dark);
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, color 0.15s;
    }
    .btn-more:hover { background: var(--gold); color: var(--dark); }

    /* ─── MODAL ──────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .modal-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
    }
    .modal-close {
      width: 32px; height: 32px;
      border: none; background: var(--off);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--border); }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      background: var(--white);
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--gold);
    }
    .field textarea { resize: vertical; min-height: 72px; }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .btn-cancel {
      padding: 10px 20px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      color: var(--muted);
    }
    .btn-save {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      background: var(--dark);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: var(--charcoal); }
    .btn-save:disabled { opacity: 0.5; cursor: default; }

    /* ─── TOAST ──────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--dark);
      color: var(--gold);
      padding: 12px 24px;
      border-radius: 99px;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 600;
      border: 1px solid var(--gold-dim);
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 640px) {
      header, .pill-strip, .toolbar, .grid, .load-more-wrap { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .wordmark-title { font-size: 1.3rem; }
      .date-group { display: none; }
    }
  </style>
</head>
<body>

<!-- ─── LOADER ──────────────────────────────────────── -->
<div id="loader">
  <div class="loader-rings">
    <span></span><span></span><span></span>
    <div class="loader-icon">🤝</div>
  </div>
  <div class="loader-wordmark">Strictly Business</div>
  <div class="loader-sub">Community Referral Directory</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<!-- ─── APP ─────────────────────────────────────────── -->
<div id="app">

  <header>
    <div class="header-top">
      <div class="wordmark">
        <div class="wordmark-title">Strictly <span>Business</span></div>
        <div class="wordmark-sub">Community Referral Directory</div>
      </div>
      <div class="header-count">
        <strong id="totalCount">—</strong>
        recommendations
      </div>
    </div>
    <div class="search-strip">
      <div class="search-wrap">
        <svg width="16" height="16" fill="white" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search by name, trade, keyword…" />
      </div>
      <div class="date-group">
        <label>From</label>
        <input type="date" id="dateFrom" />
        <label>To</label>
        <input type="date" id="dateTo" />
      </div>
      <button class="btn-add" id="addBtn">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2z"/>
        </svg>
        Add Referral
      </button>
    </div>
  </header>

  <div class="pill-strip" id="pillStrip">
    <button class="pill active" data-cat="">All</button>
  </div>

  <div class="toolbar">
    <div class="toolbar-count" id="toolbarCount">Loading…</div>
    <div class="sort-wrap">
      Sort by
      <select id="sortSelect">
        <option value="name">Name A–Z</option>
        <option value="name_desc">Name Z–A</option>
        <option value="date_desc">Newest first</option>
        <option value="date_asc">Oldest first</option>
        <option value="category">Category</option>
      </select>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="state-box">
      <div class="mini-spinner"></div>
      <p>Loading referrals…</p>
    </div>
  </div>

  <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
    <button class="btn-more" id="loadMoreBtn">Load more</button>
  </div>

</div>

<!-- ─── ADD MODAL ─────────────────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Referral</h2>
      <button class="modal-close" id="closeModal">✕</button>
    </div>
    <div class="field">
      <label>Name / Business *</label>
      <input type="text" id="mName" placeholder="e.g. Yitzy's Plumbing" />
    </div>
    <div class="field">
      <label>Service / Trade *</label>
      <input type="text" id="mService" placeholder="e.g. Plumber in Lakewood" />
    </div>
    <div class="field">
      <label>Category</label>
      <select id="mCategory">
        <option value="">— Auto-detect —</option>
        <option>Accounting & Tax</option>
        <option>Automotive</option>
        <option>Catering & Food</option>
        <option>Childcare</option>
        <option>Cleaning</option>
        <option>Contracting & Construction</option>
        <option>Design & Architecture</option>
        <option>Education & Tutoring</option>
        <option>Electrical</option>
        <option>Energy & Utilities</option>
        <option>Engineering & Inspection</option>
        <option>Events & Catering</option>
        <option>Fencing & Decking</option>
        <option>Finance & Lending</option>
        <option>Flooring</option>
        <option>Handyman</option>
        <option>HVAC</option>
        <option>Insurance</option>
        <option>Landscaping</option>
        <option>Legal</option>
        <option>Locksmith</option>
        <option>Marketing & PR</option>
        <option>Masonry</option>
        <option>Medical & Health</option>
        <option>Moving & Delivery</option>
        <option>Other Services</option>
        <option>Painting</option>
        <option>Pest Control</option>
        <option>Photography & Video</option>
        <option>Plumbing</option>
        <option>Pool & Spa</option>
        <option>Printing & Signage</option>
        <option>Real Estate</option>
        <option>Roofing</option>
        <option>Security</option>
        <option>Staffing & HR</option>
        <option>Storage & Warehousing</option>
        <option>Technology & IT</option>
        <option>Windows & Doors</option>
      </select>
    </div>
    <div class="field">
      <label>Contact</label>
      <input type="text" id="mContact" placeholder="Phone or email" />
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="mNotes" placeholder="Any extra details…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelModal">Cancel</button>
      <button class="btn-save" id="saveBtn">Save Referral</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://hlohdnjxemwpnnkxnhqx.supabase.co';
  const ANON_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhsb2hkbmp4ZW13cG5ua3huaHF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzU5NzYsImV4cCI6MjA5NzcxMTk3Nn0.WcwZ3VpLwwo4aDUMyrz4pwQBN1jBkKQrLBLp7mKFA-U';

  const PAGE = 48;
  let all = [], filtered = [], shown = 0;

  /* ── API ── */
  async function sbFetch(path) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` }
    });
    return r.json();
  }
  async function sbInsert(row) {
    return fetch(`${SUPABASE_URL}/rest/v1/recommendations`, {
      method: 'POST',
      headers: {
        apikey: ANON_KEY,
        Authorization: `Bearer ${ANON_KEY}`,
        'Content-Type': 'application/json',
        Prefer: 'return=representation'
      },
      body: JSON.stringify(row)
    });
  }

  /* ── LOAD ALL ── */
  async function loadAll() {
    let page = 0, done = false;
    while (!done) {
      const data = await sbFetch(`recommendations?select=*&order=name.asc&limit=1000&offset=${page*1000}`);
      if (!Array.isArray(data) || !data.length) { done = true; break; }
      all.push(...data);
      if (data.length < 1000) done = true;
      page++;
    }
    document.getElementById('totalCount').textContent = all.length.toLocaleString();
    buildPills();
    applyAll();
  }

  /* ── PILLS ── */
  function buildPills() {
    const cats = [...new Set(all.map(r => r.category).filter(Boolean))].sort();
    const strip = document.getElementById('pillStrip');
    cats.forEach(cat => {
      const b = document.createElement('button');
      b.className = 'pill';
      b.dataset.cat = cat;
      b.textContent = cat;
      b.addEventListener('click', () => selectPill(b));
      strip.appendChild(b);
    });
  }

  let activeCat = '';
  function selectPill(btn) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    applyAll();
  }
  document.getElementById('pillStrip').addEventListener('click', e => {
    if (e.target.classList.contains('pill')) selectPill(e.target);
  });

  /* ── FILTER + SORT ── */
  function applyAll() {
    const q       = document.getElementById('searchInput').value.toLowerCase().trim();
    const sort    = document.getElementById('sortSelect').value;
    const dFrom   = document.getElementById('dateFrom').value;
    const dTo     = document.getElementById('dateTo').value;

    filtered = all.filter(r => {
      if (activeCat && r.category !== activeCat) return false;
      if (dFrom && r.date_added < dFrom) return false;
      if (dTo   && r.date_added > dTo)   return false;
      if (!q) return true;
      const hay = `${r.name} ${r.service} ${r.category||''} ${r.contact||''} ${r.notes||''}`.toLowerCase();
      return q.split(/\s+/).every(w => hay.includes(w));
    });

    filtered.sort((a, b) => {
      if (sort === 'name')      return (a.name||'').localeCompare(b.name||'');
      if (sort === 'name_desc') return (b.name||'').localeCompare(a.name||'');
      if (sort === 'date_desc') return (b.date_added||'').localeCompare(a.date_added||'');
      if (sort === 'date_asc')  return (a.date_added||'').localeCompare(b.date_added||'');
      if (sort === 'category')  return (a.category||'').localeCompare(b.category||'');
      return 0;
    });

    shown = 0;
    document.getElementById('grid').innerHTML = '';
    renderBatch();
    updateCount();
  }

  function renderBatch() {
    const grid = document.getElementById('grid');
    const batch = filtered.slice(shown, shown + PAGE);
    if (!batch.length && !shown) {
      grid.innerHTML = `<div class="state-box">
        <div class="icon">🔍</div>
        <h3>No results found</h3>
        <p>Try adjusting your search or filters</p>
      </div>`;
    } else {
      batch.forEach(r => grid.appendChild(card(r)));
    }
    shown += batch.length;
    const wrap = document.getElementById('loadMoreWrap');
    wrap.style.display = shown < filtered.length ? 'block' : 'none';
  }

  function updateCount() {
    const el = document.getElementById('toolbarCount');
    el.innerHTML = `Showing <strong>${Math.min(shown, filtered.length)}</strong> of <strong>${filtered.length}</strong> referrals`;
  }

  /* ── CARD ── */
  function card(r) {
    const el = document.createElement('div');
    el.className = 'card';
    const phone = (r.contact||'').replace(/[^\d+\-\s()]/g,'').trim();
    const showNotes = r.notes && r.notes !== r.contact && r.notes !== r.name && r.notes.length > 4;
    el.innerHTML = `
      <div class="card-header">
        <div class="card-name">${esc(r.name)}</div>
        ${r.category ? `<div class="card-cat">${esc(r.category)}</div>` : ''}
      </div>
      <div class="card-service">${esc(r.service)}</div>
      ${r.contact ? `<div class="card-contact">
        <svg width="12" height="12" fill="currentColor" viewBox="0 0 16 16">
          <path d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.568 17.568 0 0 0 4.168 6.608 17.569 17.569 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.678.678 0 0 0-.58-.122l-2.19.547a1.745 1.745 0 0 1-1.657-.459L5.482 8.062a1.745 1.745 0 0 1-.46-1.657l.548-2.19a.678.678 0 0 0-.122-.58L3.654 1.328z"/>
        </svg>
        <a href="tel:${esc(phone)}">${esc(r.contact)}</a>
      </div>` : ''}
      ${showNotes ? `<div class="card-notes">${esc(r.notes)}</div>` : ''}
      ${r.date_added ? `<div class="card-date">${fmtDate(r.date_added)}</div>` : ''}
    `;
    return el;
  }

  function fmtDate(d) {
    if (!d) return '';
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── EVENTS ── */
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyAll, 220);
  });
  document.getElementById('sortSelect').addEventListener('change', applyAll);
  document.getElementById('dateFrom').addEventListener('change', applyAll);
  document.getElementById('dateTo').addEventListener('change', applyAll);
  document.getElementById('loadMoreBtn').addEventListener('click', () => { renderBatch(); updateCount(); });

  /* ── MODAL ── */
  const overlay = document.getElementById('overlay');
  document.getElementById('addBtn').addEventListener('click', () => overlay.classList.add('open'));
  document.getElementById('closeModal').addEventListener('click', () => overlay.classList.remove('open'));
  document.getElementById('cancelModal').addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const name    = document.getElementById('mName').value.trim();
    const service = document.getElementById('mService').value.trim();
    const cat     = document.getElementById('mCategory').value;
    const contact = document.getElementById('mContact').value.trim();
    const notes   = document.getElementById('mNotes').value.trim();
    if (!name || !service) { showToast('Name and service are required'); return; }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';

    const res = await sbInsert({
      name, service,
      category: cat || guessCategory(service),
      contact:  contact || null,
      notes:    notes   || null,
      date_added: new Date().toISOString().slice(0,10)
    });

    if (res.ok) {
      const [rec] = await res.json();
      all.unshift(rec);
      document.getElementById('totalCount').textContent = all.length.toLocaleString();
      overlay.classList.remove('open');
      ['mName','mService','mContact','mNotes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('mCategory').value = '';
      applyAll();
      showToast('✓ Referral added');
    } else {
      showToast('Error saving — please try again');
    }
    btn.disabled = false; btn.textContent = 'Save Referral';
  });

  /* ── TOAST ── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  /* ── CATEGORY GUESSER (for Add form) ── */
  function guessCategory(s) {
    s = s.toLowerCase();
    if (/plumb/.test(s)) return 'Plumbing';
    if (/electric/.test(s)) return 'Electrical';
    if (/roof|gutter/.test(s)) return 'Roofing';
    if (/hvac|heat|cool|ac /.test(s)) return 'HVAC';
    if (/clean|wash/.test(s)) return 'Cleaning';
    if (/lawyer|attorney|legal/.test(s)) return 'Legal';
    if (/account|tax|cpa/.test(s)) return 'Accounting & Tax';
    if (/contrac|build|renovat/.test(s)) return 'Contracting & Construction';
    if (/handyman|repair/.test(s)) return 'Handyman';
    if (/landscap|lawn|tree/.test(s)) return 'Landscaping';
    if (/paint/.test(s)) return 'Painting';
    if (/floor/.test(s)) return 'Flooring';
    if (/real estate|realtor/.test(s)) return 'Real Estate';
    if (/insur/.test(s)) return 'Insurance';
    if (/mortgage|loan|financ/.test(s)) return 'Finance & Lending';
    if (/doctor|medical|health/.test(s)) return 'Medical & Health';
    if (/tutor|teach|coach/.test(s)) return 'Education & Tutoring';
    if (/cater|food|chef/.test(s)) return 'Catering & Food';
    if (/photo|video/.test(s)) return 'Photography & Video';
    if (/design|architect/.test(s)) return 'Design & Architecture';
    if (/tech|computer|software|it /.test(s)) return 'Technology & IT';
    if (/moving|deliver|truck/.test(s)) return 'Moving & Delivery';
    if (/car|auto|vehicle/.test(s)) return 'Automotive';
    if (/pool/.test(s)) return 'Pool & Spa';
    if (/window|door/.test(s)) return 'Windows & Doors';
    if (/mason|brick|paver/.test(s)) return 'Masonry';
    if (/fence|deck/.test(s)) return 'Fencing & Decking';
    if (/pest/.test(s)) return 'Pest Control';
    if (/securi|alarm/.test(s)) return 'Security';
    return 'Other Services';
  }

  /* ── LOADER → APP ── */
  window.addEventListener('load', () => {
    loadAll().then(() => {
      setTimeout(() => {
        document.getElementById('loader').classList.add('hide');
        document.getElementById('app').classList.add('visible');
      }, 2800);
    });
  });
</script>
</body>
</html>
