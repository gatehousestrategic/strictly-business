<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strictly Business — Community Referral Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:   #0E0E0E;
      --dark:    #141414;
      --charcoal:#1E1E1E;
      --gold:    #C9A44A;
      --gold-lt: #E2C47A;
      --gold-dim:#7A5F28;
      --cream:   #F5F2ED;
      --off:     #EFEDE8;
      --white:   #FFFFFF;
      --text:    #1A1A1A;
      --muted:   #6B6560;
      --border:  #E0DDD7;
      --radius:  12px;
      --shadow:  0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 16px rgba(201,164,74,0.15), 0 12px 40px rgba(0,0,0,0.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0;
      background: var(--dark);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.6s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }

    .loader-rings {
      position: relative;
      width: 110px; height: 110px;
      margin-bottom: 36px;
    }
    .loader-rings span {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1.5px solid transparent;
    }
    .loader-rings span:nth-child(1) { border-top-color: var(--gold); animation: spin 1.2s linear infinite; }
    .loader-rings span:nth-child(2) { inset: 14px; border-right-color: var(--gold-lt); animation: spin 1.7s linear infinite reverse; opacity: .7; }
    .loader-rings span:nth-child(3) { inset: 28px; border-bottom-color: var(--gold); animation: spin 2.1s linear infinite; opacity: .45; }
    .loader-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 600;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--white);
      opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards;
    }
    .loader-sub {
      font-size: 0.68rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--gold);
      margin-top: 7px;
      opacity: 0; animation: fadeUp 0.8s ease 0.7s forwards;
    }
    .loader-bar {
      width: 160px; height: 1px;
      background: var(--charcoal);
      margin-top: 28px; overflow: hidden;
      opacity: 0; animation: fadeUp 0.4s ease 1s forwards;
    }
    .loader-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-lt));
      animation: loadbar 2.2s ease 1.1s forwards;
    }
    .loader-cold {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      margin-top: 24px;
      letter-spacing: 0.04em;
      text-align: center;
      max-width: 240px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.8s ease 2s forwards;
    }
    @keyframes loadbar { to { width: 100%; } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── APP ── */
    #app { opacity: 0; transition: opacity 0.5s ease; }
    #app.visible { opacity: 1; }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      padding: 28px 32px 0;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .header-top {
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
      margin-bottom: 24px;
    }
    .wordmark-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700;
      color: var(--white); letter-spacing: -0.02em; line-height: 1;
    }
    .wordmark-title span { color: var(--gold); }
    .wordmark-sub {
      font-size: 0.68rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold-dim);
      font-weight: 500; margin-top: 4px;
    }
    .header-count strong {
      display: block; font-size: 1.8rem; font-weight: 300;
      color: var(--gold); line-height: 1; letter-spacing: -0.03em;
    }
    .header-count { text-align: right; color: var(--muted); font-size: 0.78rem; }

    /* ── SEARCH ── */
    .search-strip {
      display: flex; gap: 10px; align-items: center;
      padding: 20px 0 0; flex-wrap: wrap;
    }
    .search-wrap { flex: 1; min-width: 240px; position: relative; }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: .4; pointer-events: none; }
    .search-wrap input {
      width: 100%; padding: 12px 14px 12px 42px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      color: var(--white); font-size: 0.95rem;
      font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .search-wrap input:focus { border-color: var(--gold-dim); background: rgba(255,255,255,0.1); }

    .date-group { display: flex; gap: 8px; align-items: center; }
    .date-group label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .date-group input[type="date"] {
      padding: 10px 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: rgba(255,255,255,0.7);
      font-size: 0.85rem; font-family: 'Inter', sans-serif; outline: none; cursor: pointer;
    }
    .date-group input[type="date"]:focus { border-color: var(--gold-dim); }

    .btn-add {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 18px; background: var(--gold);
      color: var(--dark); border: none; border-radius: 8px;
      font-size: 0.85rem; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer;
      white-space: nowrap; transition: background 0.15s;
    }
    .btn-add:hover { background: var(--gold-lt); }

    /* ── CATEGORY HOME ── */
    .view-home { padding: 32px; }

    .home-intro {
      font-size: 0.85rem; color: var(--muted);
      margin-bottom: 28px; letter-spacing: 0.01em;
    }
    .home-intro strong { color: var(--text); }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .cat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 20px;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: var(--shadow);
    }
    .cat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      opacity: 0; transition: opacity 0.2s;
    }
    .cat-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: rgba(201,164,74,0.3); }
    .cat-card:hover::before { opacity: 1; }
    .cat-card.active { border-color: var(--gold); box-shadow: var(--shadow-hover); }
    .cat-card.active::before { opacity: 1; }

    .cat-icon { font-size: 1.6rem; line-height: 1; }
    .cat-name { font-weight: 600; font-size: 0.92rem; color: var(--text); line-height: 1.3; }
    .cat-count {
      font-size: 0.75rem; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .cat-count strong { color: var(--gold-dim); font-weight: 600; }

    /* ── RESULTS VIEW ── */
    .view-results { display: none; }
    .view-results.open { display: block; }

    .results-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 32px 0;
      flex-wrap: wrap;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      color: var(--gold); font-size: 0.85rem; font-weight: 600;
      font-family: 'Inter', sans-serif; padding: 6px 0;
      transition: opacity 0.15s;
    }
    .back-btn:hover { opacity: 0.7; }

    .results-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 700; color: var(--text);
    }
    .results-count {
      font-size: 0.8rem; color: var(--muted);
      margin-left: auto;
    }

    .sort-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 32px;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem; color: var(--muted);
    }
    .sort-bar select {
      padding: 6px 10px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      background: white; color: var(--text); outline: none; cursor: pointer;
    }

    /* ── RESULT LIST ── */
    .result-list { padding: 0 32px 48px; }

    .result-item {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 24px;
      align-items: start;
      transition: background 0.1s;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover { background: rgba(201,164,74,0.03); margin: 0 -12px; padding: 20px 12px; border-radius: 8px; }

    .result-asked {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--gold-dim); margin-bottom: 4px;
    }
    .result-query {
      font-size: 0.82rem; color: var(--muted);
      margin-bottom: 10px; line-height: 1.5;
      font-style: italic;
    }
    .result-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700;
      color: var(--text); line-height: 1.2;
    }
    .result-notes {
      font-size: 0.8rem; color: var(--muted);
      margin-top: 6px; line-height: 1.5;
    }
    .result-contact {
      text-align: right;
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px;
    }
    .result-phone {
      font-size: 0.88rem; font-weight: 600;
      color: var(--gold-dim);
    }
    .result-phone a { color: inherit; text-decoration: none; }
    .result-phone a:hover { color: var(--gold); }
    .result-date { font-size: 0.7rem; color: #B0AA9F; }

    /* ── EMPTY / LOADING ── */
    .state-box {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 24px; color: var(--muted);
      gap: 12px; text-align: center;
    }
    .state-box .icon { font-size: 2.5rem; opacity: .4; }
    .state-box h3 { font-size: 1rem; color: var(--text); }
    .mini-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }

    /* ── LOAD MORE ── */
    .load-more-wrap { text-align: center; padding: 0 32px 48px; }
    .btn-more {
      padding: 12px 36px; background: var(--dark);
      color: var(--gold); border: 1px solid var(--gold-dim);
      border-radius: var(--radius); font-size: 0.875rem; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer;
      letter-spacing: 0.05em; transition: background 0.15s, color 0.15s;
    }
    .btn-more:hover { background: var(--gold); color: var(--dark); }

    /* ── MODAL ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 500;
      align-items: center; justify-content: center; padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: 16px;
      padding: 32px; width: 100%; max-width: 460px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
    .modal-close {
      width: 32px; height: 32px; border: none;
      background: var(--off); border-radius: 50%; cursor: pointer;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: background 0.15s;
    }
    .modal-close:hover { background: var(--border); }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.9rem; font-family: 'Inter', sans-serif;
      color: var(--text); outline: none; transition: border-color 0.15s;
      background: var(--white);
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
    .field textarea { resize: vertical; min-height: 72px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
    .btn-cancel {
      padding: 10px 20px; border: 1.5px solid var(--border);
      border-radius: 8px; background: white;
      font-family: 'Inter', sans-serif; font-size: 0.875rem;
      cursor: pointer; color: var(--muted);
    }
    .btn-save {
      padding: 10px 28px; border: none; border-radius: 8px;
      background: var(--dark); color: var(--gold);
      font-family: 'Inter', sans-serif; font-size: 0.875rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: var(--charcoal); }
    .btn-save:disabled { opacity: 0.5; cursor: default; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--dark); color: var(--gold);
      padding: 12px 24px; border-radius: 99px;
      font-size: 0.875rem; font-weight: 500; z-index: 600;
      border: 1px solid var(--gold-dim); transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    footer {
      background: var(--dark);
      text-align: center;
      padding: 20px 32px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
    }
    footer a:hover { color: var(--gold-lt); }

    @media (max-width: 640px) {
      header, .view-home, .results-header, .sort-bar, .result-list, .load-more-wrap { padding-left: 16px; padding-right: 16px; }
      .cat-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .date-group { display: none; }
      .result-item { grid-template-columns: 1fr; }
      .result-contact { align-items: flex-start; text-align: left; }
    }
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-rings">
    <span></span><span></span><span></span>
    <div class="loader-icon">🤝</div>
  </div>
  <div class="loader-wordmark">Strictly Business</div>
  <div class="loader-sub">Community Referral Directory</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  <div class="loader-cold">First load may take a moment —<br>we're waking up the server for you.</div>
</div>

<!-- APP -->
<div id="app">

  <header>
    <div class="header-top">
      <div>
        <div class="wordmark-title">Strictly <span>Business</span></div>
        <div class="wordmark-sub">Community Referral Directory</div>
      </div>
      <div class="header-count">
        <strong id="totalCount">—</strong>
        referrals
      </div>
    </div>
    <div class="search-strip">
      <div class="search-wrap">
        <svg width="16" height="16" fill="white" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search by name, trade, keyword…" />
      </div>
      <div class="date-group">
        <label>From</label><input type="date" id="dateFrom" />
        <label>To</label><input type="date" id="dateTo" />
      </div>
      <button class="btn-add" id="addBtn">
        <svg width="13" height="13" fill="currentColor" viewBox="0 0 16 16"><path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2z"/></svg>
        Add Referral
      </button>
    </div>
  </header>

  <!-- HOME: category cards -->
  <div class="view-home" id="viewHome">
    <div class="home-intro" id="homeIntro">Loading categories…</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- RESULTS: filtered list -->
  <div class="view-results" id="viewResults">
    <div class="results-header">
      <button class="back-btn" id="backBtn">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/></svg>
        All Categories
      </button>
      <div class="results-title" id="resultsTitle"></div>
      <div class="results-count" id="resultsCount"></div>
    </div>
    <div class="sort-bar">
      Sort by
      <select id="sortSelect">
        <option value="name">Name A–Z</option>
        <option value="name_desc">Name Z–A</option>
        <option value="date_desc">Newest first</option>
        <option value="date_asc">Oldest first</option>
      </select>
    </div>
    <div class="result-list" id="resultList"></div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
      <button class="btn-more" id="loadMoreBtn">Load more</button>
    </div>
  </div>

</div>

<!-- ADD MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Referral</h2>
      <button class="modal-close" id="closeModal">✕</button>
    </div>
    <div class="field"><label>Name / Business *</label><input type="text" id="mName" placeholder="e.g. Yitzy's Plumbing" /></div>
    <div class="field"><label>What they were asked for *</label><input type="text" id="mService" placeholder="e.g. Plumber in Lakewood" /></div>
    <div class="field">
      <label>Category</label>
      <select id="mCategory">
        <option value="">— Auto-detect —</option>
        <option>Accounting & Tax</option><option>Automotive</option><option>Catering & Food</option>
        <option>Childcare</option><option>Cleaning</option><option>Contracting & Construction</option>
        <option>Design & Architecture</option><option>Education & Tutoring</option><option>Electrical</option>
        <option>Energy & Utilities</option><option>Engineering & Inspection</option><option>Events & Catering</option>
        <option>Fencing & Decking</option><option>Finance & Lending</option><option>Flooring</option>
        <option>Handyman</option><option>HVAC</option><option>Insurance</option><option>Landscaping</option>
        <option>Legal</option><option>Locksmith</option><option>Marketing & PR</option><option>Masonry</option>
        <option>Medical & Health</option><option>Moving & Delivery</option><option>Other Services</option>
        <option>Painting</option><option>Pest Control</option><option>Photography & Video</option>
        <option>Plumbing</option><option>Pool & Spa</option><option>Printing & Signage</option>
        <option>Real Estate</option><option>Roofing</option><option>Security</option>
        <option>Staffing & HR</option><option>Storage & Warehousing</option><option>Technology & IT</option>
        <option>Windows & Doors</option>
      </select>
    </div>
    <div class="field"><label>Contact</label><input type="text" id="mContact" placeholder="Phone or email" /></div>
    <div class="field"><label>Notes</label><textarea id="mNotes" placeholder="Any extra details…"></textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelModal">Cancel</button>
      <button class="btn-save" id="saveBtn">Save Referral</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  <p>Looking for a custom AI build? Want to streamline your business? <a href="mailto:os@gatehousestrategic.com">Contact us</a></p>
</footer>

<script>
  const SUPABASE_URL = 'https://hlohdnjxemwpnnkxnhqx.supabase.co';
  const ANON_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhsb2hkbmp4ZW13cG5ua3huaHF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzU5NzYsImV4cCI6MjA5NzcxMTk3Nn0.WcwZ3VpLwwo4aDUMyrz4pwQBN1jBkKQrLBLp7mKFA-U';

  const PAGE = 40;
  const CAT_ICONS = {
    'Accounting & Tax':'💼','Automotive':'🚗','Catering & Food':'🍽️',
    'Childcare':'👶','Cleaning':'🧹','Contracting & Construction':'🏗️',
    'Design & Architecture':'📐','Education & Tutoring':'📚','Electrical':'⚡',
    'Energy & Utilities':'💡','Engineering & Inspection':'🔬','Events & Catering':'🎉',
    'Fencing & Decking':'🪵','Finance & Lending':'💰','Flooring':'🪟',
    'Handyman':'🔧','HVAC':'❄️','Insurance':'🛡️','Landscaping':'🌿',
    'Legal':'⚖️','Locksmith':'🔑','Marketing & PR':'📣','Masonry':'🧱',
    'Medical & Health':'🏥','Moving & Delivery':'📦','Other Services':'⭐',
    'Painting':'🎨','Pest Control':'🪲','Photography & Video':'📷',
    'Plumbing':'🚿','Pool & Spa':'🏊','Printing & Signage':'🖨️',
    'Real Estate':'🏠','Roofing':'🏚️','Security':'🔒',
    'Staffing & HR':'👥','Storage & Warehousing':'🏭','Technology & IT':'💻',
    'Windows & Doors':'🪞'
  };

  let all = [], filtered = [], shown = 0, activeCat = '', activeSearch = '';

  async function loadAll() {
    let page = 0, done = false;
    while (!done) {
      const r = await fetch(
        `${SUPABASE_URL}/rest/v1/recommendations?select=*&order=name.asc&limit=1000&offset=${page*1000}`,
        { headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` } }
      );
      const data = await r.json();
      if (!Array.isArray(data) || !data.length) { done = true; break; }
      all.push(...data);
      if (data.length < 1000) done = true;
      page++;
    }
    document.getElementById('totalCount').textContent = all.length.toLocaleString();
    buildHome();
  }

  /* ── HOME ── */
  function buildHome() {
    const q      = activeSearch.toLowerCase().trim();
    const dFrom  = document.getElementById('dateFrom').value;
    const dTo    = document.getElementById('dateTo').value;

    // Count per category (respecting search/date filters if active)
    const counts = {};
    all.forEach(r => {
      const cat = r.category || 'Other Services';
      const hay = `${r.name} ${r.service} ${r.category||''} ${r.contact||''} ${r.notes||''}`.toLowerCase();
      const matchQ    = !q || q.split(/\s+/).every(w => hay.includes(w));
      const matchDate = (!dFrom || (r.date_added >= dFrom)) && (!dTo || (r.date_added <= dTo));
      if (matchQ && matchDate) counts[cat] = (counts[cat]||0) + 1;
    });

    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    document.getElementById('homeIntro').innerHTML =
      `Browse <strong>${total.toLocaleString()}</strong> referrals across <strong>${Object.keys(counts).length}</strong> categories. Click a category to explore.`;

    const grid = document.getElementById('catGrid');
    grid.innerHTML = '';
    Object.entries(counts)
      .sort((a,b) => b[1]-a[1])
      .forEach(([cat, count]) => {
        const card = document.createElement('div');
        card.className = 'cat-card';
        card.innerHTML = `
          <div class="cat-icon">${CAT_ICONS[cat]||'📋'}</div>
          <div class="cat-name">${esc(cat)}</div>
          <div class="cat-count"><strong>${count}</strong> referral${count===1?'':'s'}</div>
        `;
        card.addEventListener('click', () => openCategory(cat));
        grid.appendChild(card);
      });
  }

  /* ── OPEN CATEGORY ── */
  function openCategory(cat) {
    activeCat = cat;
    document.getElementById('viewHome').style.display = 'none';
    document.getElementById('viewResults').classList.add('open');
    document.getElementById('resultsTitle').textContent = `${CAT_ICONS[cat]||'📋'} ${cat}`;
    applyResults();
  }

  function goHome() {
    activeCat = '';
    document.getElementById('viewResults').classList.remove('open');
    document.getElementById('viewHome').style.display = '';
    buildHome();
  }

  /* ── FILTER + RENDER RESULTS ── */
  function applyResults() {
    const q     = activeSearch.toLowerCase().trim();
    const sort  = document.getElementById('sortSelect').value;
    const dFrom = document.getElementById('dateFrom').value;
    const dTo   = document.getElementById('dateTo').value;

    filtered = all.filter(r => {
      if (activeCat && r.category !== activeCat) return false;
      if (dFrom && r.date_added < dFrom) return false;
      if (dTo   && r.date_added > dTo)   return false;
      if (!q) return true;
      const hay = `${r.name} ${r.service} ${r.category||''} ${r.contact||''} ${r.notes||''}`.toLowerCase();
      return q.split(/\s+/).every(w => hay.includes(w));
    });

    filtered.sort((a,b) => {
      if (sort==='name')      return (a.name||'').localeCompare(b.name||'');
      if (sort==='name_desc') return (b.name||'').localeCompare(a.name||'');
      if (sort==='date_desc') return (b.date_added||'').localeCompare(a.date_added||'');
      if (sort==='date_asc')  return (a.date_added||'').localeCompare(b.date_added||'');
      return 0;
    });

    shown = 0;
    document.getElementById('resultList').innerHTML = '';
    document.getElementById('resultsCount').textContent = `${filtered.length} result${filtered.length===1?'':'s'}`;
    renderBatch();
  }

  function renderBatch() {
    const list  = document.getElementById('resultList');
    const batch = filtered.slice(shown, shown + PAGE);

    if (!batch.length && !shown) {
      list.innerHTML = `<div class="state-box">
        <div class="icon">🔍</div>
        <h3>No results found</h3>
        <p>Try adjusting your search or filters</p>
      </div>`;
    } else {
      batch.forEach(r => list.appendChild(resultItem(r)));
    }
    shown += batch.length;
    document.getElementById('loadMoreWrap').style.display = shown < filtered.length ? 'block' : 'none';
  }

  function resultItem(r) {
    const el = document.createElement('div');
    el.className = 'result-item';
    const phone = (r.contact||'').replace(/[^\d+]/g,'');
    const showNotes = r.notes && r.notes !== r.contact && r.notes.length > 4 && r.notes !== r.name;
    el.innerHTML = `
      <div>
        <div class="result-asked">Asked for</div>
        <div class="result-query">${esc(r.service)}</div>
        <div class="result-name">${esc(r.name)}</div>
        ${showNotes ? `<div class="result-notes">${esc(r.notes)}</div>` : ''}
      </div>
      <div class="result-contact">
        ${r.contact ? `<div class="result-phone"><a href="tel:${esc(phone)}">${esc(r.contact)}</a></div>` : ''}
        ${r.date_added ? `<div class="result-date">${fmtDate(r.date_added)}</div>` : ''}
      </div>
    `;
    return el;
  }

  /* ── SEARCH (works on both views) ── */
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', e => {
    activeSearch = e.target.value;
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      if (activeCat) applyResults();
      else buildHome();
    }, 220);
  });
  document.getElementById('sortSelect').addEventListener('change', applyResults);
  document.getElementById('dateFrom').addEventListener('change', () => { activeCat ? applyResults() : buildHome(); });
  document.getElementById('dateTo').addEventListener('change',   () => { activeCat ? applyResults() : buildHome(); });
  document.getElementById('backBtn').addEventListener('click', goHome);
  document.getElementById('loadMoreBtn').addEventListener('click', renderBatch);

  /* ── MODAL ── */
  const overlay = document.getElementById('overlay');
  document.getElementById('addBtn').addEventListener('click', () => overlay.classList.add('open'));
  document.getElementById('closeModal').addEventListener('click', () => overlay.classList.remove('open'));
  document.getElementById('cancelModal').addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.classList.remove('open'); });

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const name    = document.getElementById('mName').value.trim();
    const service = document.getElementById('mService').value.trim();
    const cat     = document.getElementById('mCategory').value;
    const contact = document.getElementById('mContact').value.trim();
    const notes   = document.getElementById('mNotes').value.trim();
    if (!name || !service) { showToast('Name and service are required'); return; }
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    const res = await fetch(`${SUPABASE_URL}/rest/v1/recommendations`, {
      method: 'POST',
      headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify({ name, service, category: cat || guessCategory(service), contact: contact||null, notes: notes||null, date_added: new Date().toISOString().slice(0,10) })
    });
    if (res.ok) {
      const [rec] = await res.json();
      all.unshift(rec);
      document.getElementById('totalCount').textContent = all.length.toLocaleString();
      overlay.classList.remove('open');
      ['mName','mService','mContact','mNotes'].forEach(id => document.getElementById(id).value='');
      document.getElementById('mCategory').value='';
      activeCat ? applyResults() : buildHome();
      showToast('✓ Referral added');
    } else { showToast('Error saving — please try again'); }
    btn.disabled = false; btn.textContent = 'Save Referral';
  });

  /* ── HELPERS ── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }
  function fmtDate(d) {
    if (!d) return '';
    return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function guessCategory(s) {
    s=s.toLowerCase();
    if(/plumb/.test(s)) return 'Plumbing';
    if(/electric/.test(s)) return 'Electrical';
    if(/roof|gutter/.test(s)) return 'Roofing';
    if(/hvac|heat|cool|ac /.test(s)) return 'HVAC';
    if(/clean|wash/.test(s)) return 'Cleaning';
    if(/lawyer|attorney|legal/.test(s)) return 'Legal';
    if(/account|tax|cpa/.test(s)) return 'Accounting & Tax';
    if(/contrac|build|renovat/.test(s)) return 'Contracting & Construction';
    if(/handyman|repair/.test(s)) return 'Handyman';
    if(/landscap|lawn|tree/.test(s)) return 'Landscaping';
    if(/paint/.test(s)) return 'Painting';
    if(/floor/.test(s)) return 'Flooring';
    if(/real estate|realtor/.test(s)) return 'Real Estate';
    if(/insur/.test(s)) return 'Insurance';
    if(/mortgage|loan|financ/.test(s)) return 'Finance & Lending';
    if(/doctor|medical|health/.test(s)) return 'Medical & Health';
    if(/tutor|teach|coach/.test(s)) return 'Education & Tutoring';
    if(/cater|food|chef/.test(s)) return 'Catering & Food';
    if(/photo|video/.test(s)) return 'Photography & Video';
    if(/design|architect/.test(s)) return 'Design & Architecture';
    if(/tech|computer|software|it /.test(s)) return 'Technology & IT';
    if(/moving|deliver|truck/.test(s)) return 'Moving & Delivery';
    if(/car|auto|vehicle/.test(s)) return 'Automotive';
    if(/pool/.test(s)) return 'Pool & Spa';
    if(/window|door/.test(s)) return 'Windows & Doors';
    if(/mason|brick|paver/.test(s)) return 'Masonry';
    if(/fence|deck/.test(s)) return 'Fencing & Decking';
    if(/pest/.test(s)) return 'Pest Control';
    if(/securi|alarm/.test(s)) return 'Security';
    return 'Other Services';
  }

  /* ── INIT ── */
  window.addEventListener('load', () => {
    loadAll().then(() => {
      setTimeout(() => {
        document.getElementById('loader').classList.add('hide');
        document.getElementById('app').classList.add('visible');
      }, 3000);
    });
  });
</script>
</body>
</html>
